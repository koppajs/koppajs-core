name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]

jobs:
  quality-gate:
    name: Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Prettier check
        run: |
          echo "=== Check for .editorconfig in parent dirs ==="
          ls -la ~/.editorconfig 2>/dev/null || echo "No ~/.editorconfig"
          ls -la /home/runner/.editorconfig 2>/dev/null || echo "No /home/runner/.editorconfig"
          ls -la .editorconfig 2>/dev/null || echo "No ./.editorconfig"
          echo "=== Prettier format + diff ==="
          pnpm prettier --write . --config config/prettier.config.mjs --ignore-path config/.prettierignore
          git diff --stat
          echo "=== Detailed diff (first 100 lines) ==="
          git diff | head -100
          echo "=== Check ==="
          git checkout -- .
          pnpm prettier --check . --config config/prettier.config.mjs --ignore-path config/.prettierignore

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build
